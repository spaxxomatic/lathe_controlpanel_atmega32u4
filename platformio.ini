[env:32u416m]
platform = atmelavr
board = 32u416m
framework = arduino
board_build.usb_product = “32u416m”
build_flags = -Wl,--allow-multiple-definition
upload_protocol = custom
upload_flags =
    -CC:\Users\lun\.platformio\packages\tool-avrdude@1.60300.200527\avrdude.conf
    -patmega32u4
    -cavr109
    -PCOM6
    -b57600
    -D
upload_command = C:\Users\lun\.platformio\packages\tool-avrdude@1.60300.200527\avrdude.exe $UPLOAD_FLAGS -Uflash:w:$SOURCE:i
lib_deps = duinowitchery/hd44780
